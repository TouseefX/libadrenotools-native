name: Build libadrenotools
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          add-to-path: true

      - name: Build with CMake
        run: |
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -Dlinkernsbypass_BUILD_SHARED=ON
          make -j$(nproc)
          
      - name: List files (Diagnostic)
        run: find build -name "*.so"

      - name: Upload any compiled library
        uses: actions/upload-artifact@v4
        with:
          name: libadrenotools-arm64-v8a
          # This will grab any .so file found anywhere in the build folder
          path: build/**/*.so
          if-no-files-found: error
