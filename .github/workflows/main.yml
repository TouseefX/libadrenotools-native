name: Build libadrenotools
on: 
  workflow_dispatch:
    inputs:
      enable_overclock:
        description: 'Enable Aggressive Overclock (Warning: High Heat and dangerous)'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          add-to-path: true

      - name: Build with CMake
        run: |
          git submodule update --init --recursive
          mkdir build && cd build
          OVERCLOCK_FLAG=${{ github.event.inputs.enable_overclock == 'true' && 'ON' || 'OFF' }}
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -DANDROID_WEAK_API_DEFS=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -Dlinkernsbypass_BUILD_SHARED=ON \
            -DOVERCLOCK_BUILD=$OVERCLOCK_FLAG
          
          make -j$(nproc)
          cd ..
          mkdir -p libadrenotools
          find build/ -name "*.so" -exec cp {} libadrenotools/ \;
          
      - name: List files (Diagnostic)
        run: find build -name "*.so"

      - name: Upload any compiled library
        uses: actions/upload-artifact@v4
        with:
          name: libadrenotools-arm64-v8a
          path: libadrenotools/*.so
          if-no-files-found: error
